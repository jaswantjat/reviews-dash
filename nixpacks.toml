[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare pnpm@10 --activate",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "BASE_PATH=/ pnpm --filter @workspace/dashboard run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "NODE_ENV=production node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
