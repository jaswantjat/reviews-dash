[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "curl -fsSL https://get.pnpm.io/install.sh | sh -s -- --version 10.14.0",
  "export PATH=\"$HOME/.local/share/pnpm:$PATH\"",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "BASE_PATH=/ pnpm --filter @workspace/dashboard run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "NODE_ENV=production node --enable-source-maps ./artifacts/api-server/dist/index.mjs"
